name: Deploy Jekyll with YouTube Data

on:
  push:
    branches:
      - master # Burayı ana branch adınızla (main veya master) değiştirin
      
  # Her gün Türkiye saatiyle 13:00 civarında çalışır (UTC 10:00)
  schedule:
    - cron: '0 10 * * *' 

# Gerekli izinleri ayarlayın
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  jekyll:
    # GitHub Pages için standart runner
    runs-on: ubuntu-latest

    # Jekyll Actions ortamını yapılandır
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 1. Ruby kurulumu (YouTube betiği için zorunlu 3.3.0)
    # Bu adım sadece betiği çalıştırmak için gerekli.
    - name: Set up Ruby (For Data Fetching)
      uses: ruby/setup-ruby@v1
      with:
        # 3.3.0 güncel ve modern bir sürüm
        ruby-version: '3.3.0' 
        bundler-cache: true 

    # 2. YouTube Verilerini Çekme
    - name: Run YouTube Data Fetch Script
      run: ruby fetch_youtube_videos.rb
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

    # 3. GitHub Pages Ortamını Ayarla
    # Bu adım, GitHub'ın kendi derleme ortamını kurar ve modern Bundler/Ruby kullanır.
    - name: Setup Pages
      uses: actions/configure-pages@v5

    # 4. Sitenizi Derleyin
    - name: Build with Jekyll
      uses: actions/jekyll-build-pages@v1
      with:
        source: ./
        destination: ./_site

    # 5. Dağıtım Artifact'ı Oluştur
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './_site'

    # 6. Sitenizi GitHub Pages'a Dağıt
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
