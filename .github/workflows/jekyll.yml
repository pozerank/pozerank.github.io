name: Build and Deploy Jekyll

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 10 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.0'
          bundler-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Fetch YouTube data
        id: fetch_youtube
        if: ${{ env.YOUTUBE_API_KEY != '' }}
        run: bundle exec ruby fetch_youtube_videos.rb

      - name: Show fetched videos summary
        if: ${{ steps.fetch_youtube.outcome == 'success' }}
        run: |
          if [ -f _data/latest_videos.yml ]; then
            echo "_data/latest_videos.yml içeriği:"
            head -n 40 _data/latest_videos.yml
          else
            echo "_data/latest_videos.yml bulunamadı."
          fi

      - name: Fetch Spotify podcasts
        id: fetch_spotify
        if: ${{ env.SPOTIFY_CLIENT_ID != '' && env.SPOTIFY_CLIENT_SECRET != '' }}
        run: bundle exec ruby fetch_spotify_podcasts.rb

      - name: Show fetched podcasts summary
        if: ${{ steps.fetch_spotify.outcome == 'success' }}
        run: |
          if [ -f _data/latest_podcasts.yml ]; then
            echo "_data/latest_podcasts.yml içeriği:"
            head -n 40 _data/latest_podcasts.yml
          else
            echo "_data/latest_podcasts.yml bulunamadı."
          fi

      - name: Build site
        if: ${{ (steps.fetch_youtube.outcome == 'success' || env.YOUTUBE_API_KEY == '') && (steps.fetch_spotify.outcome == 'success' || env.SPOTIFY_CLIENT_ID == '' || env.SPOTIFY_CLIENT_SECRET == '') }}
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
